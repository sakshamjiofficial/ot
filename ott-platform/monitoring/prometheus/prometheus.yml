global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ott-platform'

scrape_configs:
  - job_name: 'ott-api'
    static_configs:
      - targets: ['api:3000']
    metrics_path: /metrics

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'ott-worker'
    static_configs:
      - targets: ['worker:9091']
    metrics_path: /metrics
