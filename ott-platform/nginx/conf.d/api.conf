# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name _;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name ssooss.store www.ssooss.store;

    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Content Security Policy
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' checkout.razorpay.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; media-src 'self' https:; connect-src 'self' https: wss:; frame-src checkout.razorpay.com;"
        always;

    # ── API ──────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass         http://api:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Auth (strict rate limit) ─────────────────────────────
    location /api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass       http://api:3000/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Upload (large body, long timeout) ────────────────────
    location /api/v1/upload/ {
        limit_req zone=upload burst=2 nodelay;
        client_max_body_size 5G;
        proxy_pass             http://api:3000/api/v1/upload/;
        proxy_request_buffering off;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
        proxy_set_header Host  $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── CMS Admin ────────────────────────────────────────────
    location /admin/ {
        proxy_pass http://cms:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Grafana ──────────────────────────────────────────────
    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Prometheus (restrict to internal) ────────────────────
    location /metrics {
        allow 127.0.0.1;
        allow 172.16.0.0/12;  # Docker internal
        deny all;
        proxy_pass http://api:3000/metrics;
    }

    # ── Health ───────────────────────────────────────────────
    location /health {
        proxy_pass http://api:3000/health;
        access_log off;
    }

    # ── Stream token verification subrequest ──────────────────────
    # This location is hit by Nginx auth_request on every HLS segment request.
    # It validates the HMAC token before proxying to R2.
    location = /internal/stream-verify {
        internal;

        proxy_pass              http://api:3000/api/v1/stream/verify;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;

        # Forward the token query params
        proxy_set_header        X-Stream-Path  $arg_path;
        proxy_set_header        X-Stream-Token $arg_token;
        proxy_set_header        X-Stream-Exp   $arg_expires;

        # Cache 200 responses for 60s to reduce API load on segment fetches
        proxy_cache_valid 200 60s;
        proxy_cache_key   "$arg_token:$arg_expires";
    }

    # ── Root → CMS ───────────────────────────────────────────
    location / {
        proxy_pass http://cms:80/;
        proxy_set_header Host $host;
    }
}
