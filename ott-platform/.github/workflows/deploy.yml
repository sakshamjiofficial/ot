name: Deploy OTT Platform

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (all / api / worker / cms)'
        required: false
        default: 'all'

env:
  REGISTRY: ghcr.io
  REPO:     ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: TypeScript compile check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: backend
        run: npm test -- --passWithNoTests

  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [api, worker, cms]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'api' && './backend' || matrix.service == 'cms' && './cms-frontend' || './worker' }}
          push:    true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Hetzner
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key:      ${{ secrets.HETZNER_SSH_KEY }}
          port:     ${{ secrets.HETZNER_PORT || 22 }}
          script: |
            set -e
            cd /opt/ott

            # Pull latest code
            git pull origin main

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new images
            docker compose pull api worker cms

            # Rolling restart — keep DB and Redis up
            docker compose up -d --no-deps api worker cms nginx

            # Wait for API health
            timeout 60 bash -c \
              'until curl -sf http://localhost:3000/health/live; do sleep 3; done'

            echo "Deploy complete: $(date)"
            docker compose ps

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed for commit ${{ github.sha }}"
          # Add Slack/email notification here if needed
