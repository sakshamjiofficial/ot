version: "3.9"

networks:
  ott_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  prometheus_data:
  grafana_data:
  loki_data:
  upload_tmp:
  worker_tmp:
  minio_data:


services:

  # ── Nginx reverse proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ott_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - /var/log/nginx:/var/log/nginx
    depends_on:
      api: { condition: service_healthy }
    networks: [ott_net]
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── NestJS API ───────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: ott_api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    expose: ["3000"]
    depends_on:
      postgres:      { condition: service_healthy }
      redis:         { condition: service_healthy }
      meilisearch:   { condition: service_started }
    networks: [ott_net]
    volumes:
      - upload_tmp:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health/live"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── React CMS ────────────────────────────────────────────────
  cms:
    build:
      context: ./cms-frontend
      dockerfile: Dockerfile
    container_name: ott_cms
    restart: unless-stopped
    expose: ["80"]
    networks: [ott_net]
    deploy:
      resources:
        limits:
          memory: 64M

  # ── FFmpeg transcoding worker ────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
      target: production
    container_name: ott_worker
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:          production
      WORK_DIR:          /tmp/worker
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      MAX_CPU_PERCENT:   ${MAX_CPU_PERCENT:-80}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [ott_net]
    volumes:
      - worker_tmp:/tmp/worker
      - /var/log/ott-worker:/var/log/worker
    expose: ["9091"]   # Prometheus metrics
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1500M
          cpus:   "2.5"
    # Scale workers: docker compose up -d --scale worker=2 worker

  # ── PostgreSQL 16 ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ott_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks: [ott_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis 7 ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ott_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks: [ott_net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M

  # ── Meilisearch ───────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: ott_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY:   ${MEILISEARCH_KEY}
      MEILI_ENV:          production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    networks: [ott_net]
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ott_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    expose: ["9090"]
    networks: [ott_net]
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ott_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL:         "https://${DOMAIN}/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    expose: ["3000"]
    depends_on: [prometheus]
    networks: [ott_net]
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Loki (log aggregation) ────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: ott_loki
    restart: unless-stopped
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    expose: ["3100"]
    networks: [ott_net]
    deploy:
      resources:
        limits:
          memory: 128M

  # ── MinIO S3 Object Storage (Mock R2) ──────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ott_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password_123
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    command: server /data --console-address ":9001"
    networks: [ott_net]
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: ott_minio_init
    depends_on:
      - minio
    volumes:
      - ./cors.xml:/cors.xml:ro
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set myminio http://minio:9000 minio_admin minio_password_123; do echo 'Waiting for MinIO...'; sleep 1; done;
      /usr/bin/mc mb myminio/ott-media || true;
      /usr/bin/mc anonymous set public myminio/ott-media;
      exit 0;
      "
    networks: [ott_net]

